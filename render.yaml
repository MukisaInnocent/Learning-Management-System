# Render Blueprint — Learning Management System (SQLite / testing mode)
# Deploy: push to GitHub → Render dashboard → "New +" → "Blueprint" → pick this repo.
# NOTE: SQLite is ephemeral on Render (data resets on redeploy). Switch to PostgreSQL for production.

services:
  # ─── NestJS API ───────────────────────────────────────────────────────────────
  - type: web
    name: edu-api
    runtime: node
    region: oregon
    plan: free
    rootDir: apps/api
    buildCommand: npm install --include=dev && npm run build && node_modules/.bin/prisma db push --accept-data-loss
    startCommand: node dist/main
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:./dev.db
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false          # set to your web URL, e.g. https://edu-web.onrender.com
      - key: PORT
        value: 4000

  # ─── Next.js Web ──────────────────────────────────────────────────────────────
  - type: web
    name: edu-web
    runtime: node
    region: oregon
    plan: free
    rootDir: apps/web
    buildCommand: (mv ../../package.json ../../_package.json 2>/dev/null || true) && npm install --include=dev && (mv ../../_package.json ../../package.json 2>/dev/null || true) && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        sync: false          # set to your API URL, e.g. https://edu-api.onrender.com/api/v1
      - key: PORT
        value: 3000

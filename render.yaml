# Render Blueprint for the Learning Management System (edu-platform monorepo)
# Deploy: push to GitHub, then in Render → "New +" → "Blueprint" → pick this repo.
# Docs: https://render.com/docs/blueprint-spec

databases:
  # ─── Managed PostgreSQL ───────────────────────────────────────────────────────
  - name: edu-db
    databaseName: edu_platform
    user: edu_admin
    plan: free
    region: oregon

services:
  # ─── NestJS API ───────────────────────────────────────────────────────────────
  - type: web
    name: edu-api
    runtime: node
    region: oregon
    plan: free
    rootDir: apps/api
    # --include=dev: Render sets NODE_ENV=production, which would otherwise skip
    # build-time devDependencies (@nestjs/cli, typescript). `npm run build` runs
    # `prisma generate` then `nest build` (see apps/api/package.json).
    buildCommand: npm install --include=dev && npm run build
    # Apply DB migrations on every boot (idempotent), then start the server
    startCommand: node_modules/.bin/prisma migrate deploy && node dist/main
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: edu-db
          property: connectionString   # auto-wired to the managed Postgres above
      - key: JWT_SECRET
        generateValue: true            # auto-generated secure secret
      - key: FRONTEND_URL
        sync: false                    # set to the web URL, e.g. https://edu-web.onrender.com
      - key: PORT
        value: 4000

  # ─── Next.js Web ──────────────────────────────────────────────────────────────
  - type: web
    name: edu-web
    runtime: node
    region: oregon
    plan: free
    rootDir: apps/web
    # --include=dev so Next's build-time devDependencies (typescript, tailwind) install
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        sync: false                    # set to the API URL, e.g. https://edu-api.onrender.com/api/v1
      - key: PORT
        value: 3000
